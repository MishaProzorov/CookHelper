{% extends 'base.html' %}
{% block title %}Вход{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
            
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-4 p-md-5">
                    
                    <div class="text-center mb-4">
                        <h1 class="fw-bold fs-2">Log in</h1>
                        <p class="text-muted">Добро пожаловать назад!</p>
                    </div>

                    <form action="/login" method="post">
                        <div class="form-group mb-3">
                            <label class="form-label small fw-bold">Email address</label>
                            <input type="email" name="gmail" class="form-control form-control-lg rounded-3" placeholder="name@example.com" required>
                        </div>

                        <div class="form-group mb-4">
                            <label class="form-label small fw-bold">Password</label>
                            <input type="password" name="password" class="form-control form-control-lg rounded-3" placeholder="Password" required>
                        </div>

                        <button class="btn btn-primary btn-lg w-100 rounded-3 mb-4" type="submit">Log in</button>
                        
                        <div class="text-center">
                            <hr>
                            <p class="mb-0">Нет аккаунта? <a href="/registration" class="text-decoration-none">Зарегистрироваться</a></p>
                        </div>
                    </form>

                </div>
            </div>

        </div>
    </div>
</div>
{% endblock %}
