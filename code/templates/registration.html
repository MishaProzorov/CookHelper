{% extends 'base.html' %}
{% block title %}Регистрация{% endblock %}

{% block content %}
<div class="container">
    <!-- row с высотой 80% экрана и центрированием -->
    <div class="row justify-content-center align-items-center" style="min-height: 80vh;">
        <div class="col-11 col-sm-8 col-md-6 col-lg-4">
            
            <!-- Белый блок-карточка -->
            <div class="card border-0 shadow-lg rounded-4">
                <div class="card-body p-4 p-md-5">
                    
                    <div class="text-center mb-4">
                        <h1 class="fw-bold fs-2">Sign up</h1>
                        <p class="text-muted">Создайте аккаунт Cook Helper</p>
                    </div>

                    <form action="/registration" method="post">
                        <!-- Поле Email -->
                        <div class="form-group mb-3">
                            <label class="form-label small fw-bold">Email address</label>
                            <input type="email" name="gmail" class="form-control form-control-lg rounded-3" placeholder="name@example.com" required>
                        </div>

                        <!-- Поле Пароль -->
                        <div class="form-group mb-4">
                            <label class="form-label small fw-bold">Password</label>
                            <input type="password" name="password" class="form-control form-control-lg rounded-3" placeholder="Password" required>
                        </div>

                        <!-- Кнопка -->
                        <button class="btn btn-primary btn-lg w-100 rounded-3 mb-3" type="submit">Sign up</button>
                        
                        <div class="text-center">
                            <small class="text-muted d-block mb-3">Нажимая кнопку, вы соглашаетесь с правилами.</small>
                            <hr>
                            <p class="mb-0">Уже есть аккаунт? <a href="/login" class="text-decoration-none">Войти</a></p>
                        </div>
                    </form>

                </div>
            </div>
            
        </div>
    </div>
</div>
{% endblock %}
