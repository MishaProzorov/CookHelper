{% extends 'base.html' %}
{% block title %}Страница регистрации{% endblock %}

{% block content %}
<div class="container d-flex justify-content-center align-items-center py-5" style="min-height: 80vh;">
    <div class="card rounded-4 shadow border-0" style="max-width: 450px; width: 100%;"> 
        <div class="card-header p-5 pb-4 border-bottom-0 bg-white rounded-top-4"> 
            <h1 class="fw-bold mb-0 fs-2 text-center">Sign up for free</h1> 
        </div> 
        <div class="card-body p-5 pt-0"> 
            <form action="/registration" method="post"> 
                <div class="form-floating mb-3"> 
                    <input type="email" name="gmail" class="form-control rounded-3" id="floatingInput" placeholder="name@example.com" required> 
                    <label for="floatingInput">Email address</label> 
                </div> 
                <div class="form-floating mb-3"> 
                    <input type="password" name="password" class="form-control rounded-3" id="floatingPassword" placeholder="Password" required> 
                    <label for="floatingPassword">Password</label> 
                </div> 
                <button class="w-100 mb-2 btn btn-lg rounded-3 btn-primary" type="submit">Sign up</button> 
                
                <small class="text-body-secondary text-center d-block mt-2">By clicking Sign up, you agree to the terms of use.</small> 
                
                <hr class="my-4"> 
                <p class="text-center mb-0">Уже есть аккаунт? <a href="/login">Войти</a></p>
            </form> 
        </div> 
    </div>
</div>
{% endblock %}
