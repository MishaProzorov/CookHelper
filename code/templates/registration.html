{% extends 'base.html' %}
{% block title %}Страница регистрации{% endblock %}

{% block content %}
<div class="modal-content rounded-4 shadow" style="max-width: 500px; margin: 0 auto;"> 
    <div class="modal-header p-5 pb-4 border-bottom-0"> 
        <h1 class="fw-bold mb-0 fs-2">Sign up for free</h1> 
        
    </div> 
    <div class="modal-body p-5 pt-0"> 

        <form action="/registration" method="post"> 
            <div class="form-floating mb-3"> 
                
                <input type="email" name="gmail" class="form-control rounded-3" id="floatingInput" placeholder="name@example.com" required> 
                <label for="floatingInput">Email address</label> 
            </div> 
            <div class="form-floating mb-3"> 
                
                <input type="password" name="password" class="form-control rounded-3" id="floatingPassword" placeholder="Password" required> 
                <label for="floatingPassword">Password</label> 
            </div> 
            <button class="w-100 mb-2 btn btn-lg rounded-3 btn-primary" type="submit">Sign up</button> 
            
            <small class="text-body-secondary text-center d-block">By clicking Sign up, you agree to the terms of use.</small> 
            
            <hr class="my-4"> 
            
        </form> 
    </div> 
</div>
{% endblock %}
