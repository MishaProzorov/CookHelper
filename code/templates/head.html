{% extends 'base.html' %}
{% block title %}Главная страница{% endblock %}

{% block content %}
<!-- Заголовок CookHelper -->

<div class="hero-banner shadow-lg">
    <img src="{{ url_for('static', path='img/banner.jpg') }}" alt="Cook Helper Banner">
    <div class="hero-banner-text">
        <h4>Cook</h4>
        <h4>Helper</h4>    
    </div>
</div>


<div class="container-fluid px-lg-5">
    <div class="row align-items-center">
        <h2>НОВОЕ</h2>
    </div>
    <div class="row align-items-center gx-5 py-5">
        
        <!-- Текст описания -->
        
        <!-- Новости -->
        <div class="col-lg-5 mb-4 mb-lg-0">
            <img src="{{ url_for('static', path='img/chat-bot.png') }}" class="heroCarousel">
        </div>

        <!-- Слайдер -->
        <div class="col-lg-5">
            <div id="heroCarousel" class="carousel slide carousel-fade shadow-lg rounded-4 overflow-hidden" data-bs-ride="carousel">
                <div class="carousel-inner">
                    <div class="carousel-item active">
                        <img src="{{ url_for('static', path='img/HomePage(food).png') }}" class="d-block w-100" alt="Food">
                    </div>
                    <div class="carousel-item">
                        <img src="{{ url_for('static', path='img/HomePage(green).png') }}" class="d-block w-100" alt="Green">
                    </div>
                    <!-- ... остальные элементы ... -->
                    <div class="carousel-item">
                        <img src="{{ url_for('static', path='img/HomePage(fastfood).png') }}" class="d-block w-100" alt="Fastfood">
                    </div>
                </div>
                
                <!-- Кнопки управления (сделаем их чуть заметнее через bg-opacity) -->
                <button class="carousel-control-prev" type="button" data-bs-target="#heroCarousel" data-bs-slide="prev">
                    <span class="carousel-control-prev-icon bg-dark bg-opacity-50 rounded-circle p-3" aria-hidden="true"></span>
                </button>
                <button class="carousel-control-next" type="button" data-bs-target="#heroCarousel" data-bs-slide="next">
                    <span class="carousel-control-next-icon bg-dark bg-opacity-50 rounded-circle p-3" aria-hidden="true"></span>
                </button>
            </div>
        </div>
        <div class="col-lg-2 text-section text-center text-lg-start mb-4 mb-lg-0">
            <h2 class="h3">Текст описания</h2>
        </div>
    </div> 

    <!-- Нижние блоки (раздвигаем их) -->
    <div class="row align-items-center gx-5 row-spacing">
        <div class="col-lg-12">
            <h2 class="display-6 text-center text-muted">GGGGDGDGDGGDGDGDGGDGD</h2>
        </div>
    </div>

    <div class="row align-items-center gx-5 row-spacing mb-5">
        <div class="col-lg-12">
            <h2 class="display-6 text-center text-muted">GGGGDGDGDGGDGDGDGGDGD</h2>
        </div>
    </div>
</div>
{% endblock %}
